<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hank Remote Connections</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260521-inline-note-controls">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/assets/site.webmanifest">
  </head>
  <body>
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Connections</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Home</h2>
            <span id="home-role" class="pill">Loading</span>
          </div>
          <label>
            <span>Home</span>
            <select id="home-select"></select>
          </label>
          <p id="home-meta" class="hint">Choose the home these connections belong to.</p>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Connection Status</h2>
            <span class="pill">Current</span>
          </div>
          <div id="profiles-summary" class="card-list empty-state">Loading connections.</div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Home Assistant</h2>
            <span class="pill">Lights and Sensors</span>
          </div>
          <form id="ha-form" class="stack">
            <div class="settings-grid">
            <label class="setting-field">
              <span>Home Assistant Address</span>
              <input id="ha-base-url" type="url" placeholder="http://homeassistant.local:8123" autocomplete="url">
            </label>
            <label class="setting-field">
              <span>Request Timeout</span>
              <input id="ha-timeout-seconds" type="number" min="1" max="120" step="1" placeholder="10">
            </label>
            </div>
            <label>
              <span>Home Assistant Token</span>
              <input id="ha-token" type="password" autocomplete="new-password" placeholder="Paste a long-lived access token">
            </label>
            <label>
              <span><input id="ha-persist" type="checkbox" checked> Save this on the home connector</span>
            </label>
            <div class="actions wrap">
              <button type="submit">Save Home Assistant</button>
            </div>
          </form>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>File Server</h2>
            <span class="pill">NAS or SMB</span>
          </div>
          <div class="tool-shell">
            <a class="manage-link" href="/dashboard/settings#connections">Open File Server Settings</a>
          </div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/service-profiles.js" defer></script>
    <script src="/assets/admin-nav.js?v=20260525-site-reorg" defer></script>
  </body>
</html>
