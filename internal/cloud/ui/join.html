<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Join Hank Remote</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260608-password-reset">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell auth-shell">
      <header class="hero auth-hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Join Home</h1>
        </div>
        <div class="hero-card">
          <div class="status-row">
            <span class="status-dot"></span>
            <span id="invite-state">Invite Required</span>
          </div>
          <p id="invite-meta">Enter the invite code shared by your admin.</p>
        </div>
      </header>

      <main class="auth-grid">
        <section class="panel auth-card">
          <div class="panel-head">
            <h2>Invite</h2>
            <span class="pill">Setup</span>
          </div>
          <form id="join-form" class="stack">
            <label>
              <span>Invite Code</span>
              <input id="token" type="text" placeholder="Paste invite code" required autocomplete="one-time-code">
            </label>
            <label>
              <span>Email</span>
              <input id="email" type="email" placeholder="name@example.com" required autocomplete="username">
            </label>
            <label>
              <span>Password</span>
              <input id="password" type="password" placeholder="At least 8 characters" required autocomplete="new-password">
            </label>
            <div class="actions">
              <button type="submit" id="join-button">Create Account</button>
              <a class="button-link" href="/">Log In</a>
            </div>
          </form>
          <div id="invite-preview" class="token-output" hidden></div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/ui-helpers.js" defer></script>
    <script src="/assets/join.js" defer></script>
  </body>
</html>
