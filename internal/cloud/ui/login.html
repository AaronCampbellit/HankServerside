<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hank Remote Login</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260521-inline-note-controls">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/assets/site.webmanifest">
  </head>
  <body>
    <div class="shell auth-shell">
      <header class="hero auth-hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Sign In</h1>
        </div>
        <div class="hero-card">
          <div class="status-row">
            <span class="status-dot"></span>
            <span>Private Dashboard</span>
          </div>
          <p>Use the same account that the Hank app uses.</p>
        </div>
      </header>

      <main class="auth-grid">
        <section class="panel auth-card">
          <div class="panel-head">
            <h2>Account</h2>
            <span class="pill">Hank Login</span>
          </div>
          <form id="auth-form" class="stack">
            <label>
              <span>Email</span>
              <input id="email" type="email" placeholder="name@example.com" required autocomplete="username">
            </label>
            <label>
              <span>Password</span>
              <input id="password" type="password" placeholder="At least 8 characters" required autocomplete="current-password">
            </label>
            <div class="actions">
              <button type="button" id="login-button">Log In</button>
              <button type="button" id="register-button" class="secondary">Register</button>
            </div>
          </form>
          <p class="hint">Register is only for the first admin account. After setup, use invitations.</p>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/login.js" defer></script>
  </body>
</html>
