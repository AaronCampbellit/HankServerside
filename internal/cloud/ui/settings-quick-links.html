<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote Quick Link Settings</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260606-mobile-responsive">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell dashboard-shell settings-page">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Quick Link Settings</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel settings-index-panel" aria-label="Settings sections">
          <div data-settings-nav></div>
        </section>

        <section id="quick-links-panel" class="panel wide-panel quick-links-panel">
          <div class="panel-head">
            <h2>Quick Links</h2>
            <span class="quick-links-actions">
              <span id="quick-links-count" class="pill" hidden>0 links</span>
              <button id="quick-links-refresh" type="button" class="secondary" hidden>Refresh</button>
              <button id="quick-link-add" type="button" class="icon-button secondary" title="Add quick link" aria-label="Add quick link" aria-expanded="false" hidden>
                <span aria-hidden="true">+</span>
              </button>
              <button id="quick-links-edit-mode" type="button" class="secondary" aria-pressed="false" hidden>Edit</button>
            </span>
          </div>
          <form id="quick-link-form" class="quick-link-form" hidden>
            <input id="quick-link-id" type="hidden">
            <label>
              <span>Name</span>
              <input id="quick-link-title" type="text" maxlength="80" placeholder="GitHub">
            </label>
            <label>
              <span>URL</span>
              <input id="quick-link-url" type="url" maxlength="2048" placeholder="https://github.com" required>
            </label>
            <label>
              <span>Description</span>
              <input id="quick-link-description" type="text" maxlength="180" placeholder="Code">
            </label>
            <label class="toggle-field">
              <input id="quick-link-health" type="checkbox" checked>
              <span>Status checks</span>
            </label>
            <div class="actions wrap">
              <button type="submit">Save</button>
              <button id="quick-link-cancel" type="button" class="secondary">Cancel</button>
            </div>
          </form>
          <div id="quick-links-list" class="quick-links-grid empty-state">Loading links.</div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/ui-helpers.js" defer></script>
    <script src="/assets/settings-nav.js" defer></script>
    <script src="/assets/settings-quick-links.js" defer></script>
    <script src="/assets/admin-nav.js?v=20260606-mobile-responsive" defer></script>
  </body>
</html>
