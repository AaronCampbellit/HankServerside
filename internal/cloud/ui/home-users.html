<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote People</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260606-mobile-responsive">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>People</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Home</h2>
            <span id="home-role" class="pill">Loading</span>
          </div>
          <label>
            <span>Home</span>
            <select id="home-select"></select>
          </label>
          <p id="home-meta" class="hint">Pick a home to see who has access.</p>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Invite Someone</h2>
            <span class="pill">Admin</span>
          </div>
          <form id="invite-form" class="stack compact">
            <label>
              <span>Email</span>
              <input id="invite-email" type="email" placeholder="name@example.com" required>
            </label>
            <label>
              <span>Role</span>
              <select id="invite-role">
                <option value="member">member</option>
              </select>
            </label>
            <button type="submit">Create Invite</button>
          </form>
          <div id="invite-output" class="token-output" hidden></div>
          <p id="invite-disabled" class="hint" hidden>Only admins can invite people.</p>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>People With Access</h2>
            <span id="member-count" class="pill">0 members</span>
          </div>
          <div id="member-list" class="card-list empty-state">Loading members.</div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Pending Invites</h2>
            <span id="invitation-count" class="pill">0 pending</span>
          </div>
          <div id="invitation-list" class="card-list empty-state">Loading invitations.</div>
        </section>
      </main>

      <dialog id="password-reset-dialog" class="file-dialog">
        <form id="password-reset-form" method="dialog">
          <h3>Reset Password</h3>
          <div id="password-reset-target" class="dialog-copy"></div>
          <label>
            <span>Temporary Password</span>
            <input id="temporary-password" type="text" autocomplete="off" required>
          </label>
          <label class="toggle-field">
            <input id="require-password-change" type="checkbox" checked>
            <span>Require password change on next login</span>
          </label>
          <div id="password-reset-output" class="token-output" hidden></div>
          <div class="actions wrap">
            <button id="generate-password-button" type="button" class="secondary">Generate</button>
            <button type="submit">Reset Password</button>
            <button id="cancel-password-reset-button" type="button" class="ghost">Cancel</button>
          </div>
        </form>
      </dialog>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/home-users.js" defer></script>
    <script src="/assets/admin-nav.js?v=20260606-mobile-responsive" defer></script>
  </body>
</html>
