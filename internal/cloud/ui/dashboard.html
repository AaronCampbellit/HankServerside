<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote Home</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260606-mobile-responsive">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Home</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2 id="home-panel-title">Current Home</h2>
            <span id="home-count" class="pill">0 homes</span>
          </div>
          <div id="home-list" class="card-list empty-state">Loading home.</div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Home Connector</h2>
            <span id="agent-count" class="pill">0 online</span>
          </div>
          <div id="agent-list" class="card-list empty-state">Connector status appears here.</div>
        </section>

        <section id="quick-links-panel" class="panel wide-panel quick-links-panel">
          <div class="panel-head">
            <h2>Quick Links</h2>
            <span class="quick-links-actions">
              <span id="quick-links-count" class="pill">0 links</span>
              <a class="ops-card manage-link" href="/dashboard/settings/quick-links">Manage</a>
            </span>
          </div>
          <div id="quick-links-list" class="quick-links-grid empty-state">Loading links.</div>
        </section>

        <section id="setup-checklist-panel" class="panel wide-panel setup-checklist-panel">
          <div class="panel-head">
            <h2>First Setup</h2>
            <span id="setup-status" class="pill">Checking</span>
          </div>
          <div id="setup-checklist" class="setup-checklist"></div>
        </section>

        <details id="health" class="panel wide-panel collapsible-panel dashboard-health-panel" open>
          <summary class="panel-head collapsible-panel-head">
            <h2>Health</h2>
            <span class="collapsible-panel-actions">
              <span id="sync-health-pill" class="pill">Checking</span>
              <span class="chevron" aria-hidden="true"></span>
            </span>
          </summary>
          <div class="collapsible-panel-body">
            <div id="sync-summary" class="dashboard-health-grid"></div>
            <div class="dashboard-health-actions">
              <a class="ops-card manage-link" href="/dashboard/settings/connections">Connections</a>
              <a class="ops-card manage-link" href="/dashboard/settings/backups" data-admin-only="true" hidden>Backups</a>
              <a class="ops-card manage-link" href="/docs/deployment">Setup Guide</a>
            </div>
          </div>
        </details>

      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/ui-helpers.js" defer></script>
    <script src="/assets/dashboard.js?v=20260601-health-panel" defer></script>
    <script src="/assets/admin-nav.js?v=20260606-mobile-responsive" defer></script>
  </body>
</html>
