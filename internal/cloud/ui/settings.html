<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote Settings</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260606-mobile-responsive">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell dashboard-shell settings-page">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Settings</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="settings-layout">
        <section class="panel settings-index-panel" aria-label="Settings sections">
          <div data-settings-nav></div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Settings</h2>
            <span class="pill">Sections</span>
          </div>
          <div class="quick-links-grid">
            <a class="quick-link-card" href="/dashboard/settings/home">
              <span class="quick-link-title">Home</span>
              <span class="quick-link-status-text">Name, connector setup, and setup file.</span>
            </a>
            <a class="quick-link-card" href="/dashboard/settings/connections">
              <span class="quick-link-title">Connections</span>
              <span class="quick-link-status-text">Home Assistant, SMB, and file sources.</span>
            </a>
            <a class="quick-link-card" href="/dashboard/settings/apps">
              <span class="quick-link-title">Apps</span>
              <span class="quick-link-status-text">Install and configure Hank app packages.</span>
            </a>
          </div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/ui-helpers.js" defer></script>
    <script src="/assets/settings-nav.js" defer></script>
    <script src="/assets/settings.js?v=20260530-resizer-guard" defer></script>
    <script src="/assets/admin-nav.js?v=20260606-mobile-responsive" defer></script>
  </body>
</html>
