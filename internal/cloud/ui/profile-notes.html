<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hank Remote Notes</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260519-notes-ui">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/assets/site.webmanifest">
  </head>
  <body class="notes-page">
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Notes</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections">
        <a class="tab-link" href="/dashboard">Overview</a>
        <a class="tab-link" href="/dashboard/home-users">People</a>
        <a class="tab-link" href="/dashboard/service-profiles">Connections</a>
        <a class="tab-link" href="/dashboard/sync-status">Status</a>
        <a class="tab-link" href="/dashboard/storage" data-admin-only="true" hidden>Backups</a>
        <a class="tab-link" href="/dashboard/hank">Hank</a>
        <a class="tab-link" href="/dashboard/assistant-settings">AI Settings</a>
        <a class="tab-link active" href="/dashboard/profile-notes">My Notes</a>
        <a class="tab-link" href="/dashboard/file-server">File Server</a>
        <a class="tab-link" href="/dashboard/accept-invitation">Join Home</a>
      </nav>

      <main class="notes-workspace">
        <section class="notes-tab-panel" aria-label="Notes">
          <div class="notes-topbar">
            <div class="notes-search-wrap">
              <input id="note-search" type="search" placeholder="Find notes">
              <span id="note-count" class="pill">0 notes</span>
            </div>
            <div class="actions wrap">
              <button id="refresh-button" type="button" class="secondary">Refresh</button>
              <button id="new-button" type="button">New Note</button>
            </div>
          </div>
          <div id="note-tabs" class="note-tabs empty-state">Loading notes.</div>
        </section>

        <section class="document-panel" aria-label="Note editor">
          <div class="document-head">
            <input id="note-title" class="document-title" type="text" placeholder="Untitled">
            <div class="document-meta">
              <span id="save-state" class="save-state">Saved</span>
              <span id="last-saved">Not saved yet</span>
              <button id="delete-button" type="button" class="ghost">Delete</button>
            </div>
          </div>

          <div class="formatting-toolbar" role="toolbar" aria-label="Formatting">
            <button type="button" data-format="undo" title="Undo" aria-label="Undo">Undo</button>
            <button type="button" data-format="redo" title="Redo" aria-label="Redo">Redo</button>
            <button type="button" data-format="bold" title="Bold" aria-label="Bold"><strong>B</strong></button>
            <button type="button" data-format="italic" title="Italic" aria-label="Italic"><em>I</em></button>
            <button type="button" data-format="underline" title="Underline" aria-label="Underline"><u>U</u></button>
            <button type="button" data-format="decrease" title="Smaller Heading" aria-label="Smaller Heading">A-</button>
            <button type="button" data-format="increase" title="Larger Heading" aria-label="Larger Heading">A+</button>
            <button type="button" data-format="heading" title="Heading" aria-label="Heading">H</button>
            <button type="button" data-format="bullet" title="Bullets" aria-label="Bullets">-</button>
            <button type="button" data-format="number" title="Numbers" aria-label="Numbers">1.</button>
            <button type="button" data-format="checklist" class="checklist-format-button" title="Checklist" aria-label="Checklist">
              <span class="toolbar-check-circle" aria-hidden="true"></span>
            </button>
            <button type="button" data-format="tag" title="Tag" aria-label="Tag">#</button>
            <button type="button" data-format="link" title="Link" aria-label="Link">Link</button>
          </div>

          <div id="note-link-strip" class="note-link-strip" hidden></div>
          <div id="note-checklist-strip" class="note-checklist-strip" hidden></div>
          <textarea id="note-content" class="document-editor" rows="24" spellcheck="true" placeholder="Start writing"></textarea>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/profile-notes.js?v=20260519-note-history-links" defer></script>
    <script src="/assets/admin-nav.js?v=20260504-frame-full-width" defer></script>
  </body>
</html>
