<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hank Remote Join Home</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260418-dark-compact">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/assets/site.webmanifest">
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Join Home</h1>
          <p class="lede">Use an invite code to join someone else's Hank Remote home.</p>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections">
        <a class="tab-link" href="/dashboard">Overview</a>
        <a class="tab-link" href="/dashboard/home-users">People</a>
        <a class="tab-link" href="/dashboard/service-profiles">Connections</a>
        <a class="tab-link" href="/dashboard/sync-status">Status</a>
        <a class="tab-link" href="/dashboard/storage" data-admin-only="true" hidden>Storage</a>
        <a class="tab-link" href="/dashboard/profile-notes">My Notes</a>
        <a class="tab-link" href="/dashboard/file-transfers">Transfers</a>
        <a class="tab-link active" href="/dashboard/accept-invitation">Join Home</a>
      </nav>

      <main class="grid">
        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Invite Code</h2>
            <span class="pill">Join</span>
          </div>
          <label>
            <span>Code</span>
            <input id="token" type="text" placeholder="Paste invitation token">
          </label>
          <div class="actions wrap">
            <button id="accept-button" type="button">Join Home</button>
          </div>
          <div id="result" class="card-list empty-state">Enter an invite code to join a home.</div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/accept-invitation.js" defer></script>
    <script src="/assets/admin-nav.js" defer></script>
  </body>
</html>
