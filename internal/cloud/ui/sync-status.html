<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote Status</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260606-mobile-responsive">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Status</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Home</h2>
            <span class="pill">Status</span>
          </div>
          <label>
            <span>Home</span>
            <select id="home-select"></select>
          </label>
          <div class="actions wrap">
            <button id="refresh-button" type="button">Refresh Status</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Saved Connections</h2>
            <span id="profile-count" class="pill">0 saved</span>
          </div>
          <div id="profiles-output" class="card-list empty-state">Choose a home to check saved connections.</div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Notes</h2>
            <span id="notes-status" class="pill">Unknown</span>
          </div>
          <div id="notes-output" class="kv-grid"></div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/sync-status.js" defer></script>
    <script src="/assets/admin-nav.js?v=20260606-mobile-responsive" defer></script>
  </body>
</html>
