<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote Home Assistant</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260606-mobile-responsive">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Home Assistant</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Connector</h2>
            <span id="homeassistant-agent-pill" class="pill">Checking</span>
          </div>
          <div id="homeassistant-agent-output" class="card-list empty-state" hidden></div>
          <div class="actions wrap">
            <a class="button-link secondary" href="/dashboard/settings#connections">Connection Settings</a>
          </div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Dashboard</h2>
            <span id="ha-dashboard-count" class="pill">0 Tiles</span>
          </div>
          <div class="tool-shell">
            <div id="ha-dashboard" class="ha-dashboard-grid empty-state">Loading entities.</div>
          </div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Entities</h2>
            <span id="ha-entity-count" class="pill">Not Loaded</span>
          </div>
          <div class="tool-shell">
            <label>
              <span>Search Entities</span>
              <input id="ha-entity-search" type="search" placeholder="Kitchen light, temperature, garage" autocomplete="off">
            </label>
            <div id="ha-entity-results" class="card-list empty-state">Loading entities.</div>
          </div>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/home-assistant.js?v=20260525-site-reorg" defer></script>
    <script src="/assets/admin-nav.js?v=20260606-mobile-responsive" defer></script>
  </body>
</html>
