<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Change Hank Remote Password</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260608-password-reset">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/hank-icon-192.png">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  </head>
  <body>
    <div class="shell auth-shell">
      <header class="hero auth-hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Change Password</h1>
        </div>
        <div class="hero-card">
          <div class="status-row">
            <span class="status-dot"></span>
            <span id="session-state">Password Required</span>
          </div>
          <p id="session-meta">Set a new password to continue.</p>
        </div>
      </header>

      <main class="auth-grid">
        <section class="panel auth-card">
          <div class="panel-head">
            <h2>Password</h2>
            <span class="pill">Required</span>
          </div>
          <form id="password-form" class="stack">
            <label>
              <span>Current Password</span>
              <input id="current-password" type="password" required autocomplete="current-password">
            </label>
            <label>
              <span>New Password</span>
              <input id="new-password" type="password" required autocomplete="new-password" placeholder="At least 8 characters">
            </label>
            <button type="submit">Update Password</button>
          </form>
        </section>
      </main>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/password-change.js" defer></script>
  </body>
</html>
