<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Hank Remote Apps</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260608-apps">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png">
  </head>
  <body>
    <div class="shell dashboard-shell">
      <header class="hero">
        <div>
          <div class="brand-lockup">
            <img class="brand-icon" src="/assets/hank-icon-192.png" alt="" aria-hidden="true">
            <p class="eyebrow">Hank Remote</p>
          </div>
          <h1>Apps</h1>
        </div>
        <div class="hero-card">
          <div class="panel-head">
            <div class="status-row">
              <span class="status-dot"></span>
              <span id="session-state">Checking login</span>
            </div>
            <button id="logout-button" class="ghost">Log Out</button>
          </div>
          <p id="session-meta">Checking your Hank account.</p>
        </div>
      </header>

      <nav class="tab-strip" aria-label="Dashboard Sections"></nav>

      <main class="grid">
        <section class="panel settings-index-panel" aria-label="Settings sections">
          <div data-settings-nav></div>
        </section>

        <section class="panel wide-panel">
          <div class="panel-head">
            <h2>Installed Apps</h2>
            <span id="apps-count" class="pill">Loading</span>
          </div>
          <div class="actions wrap">
            <button id="app-install-open-button" type="button">Install App</button>
          </div>
          <div class="settings-form">
            <label class="setting-field">
              <span>Installed app</span>
              <select id="installed-app-select"></select>
            </label>
            <div id="selected-app-panel" class="stack empty-state">Loading apps.</div>
            <div class="stack" id="app-config-panel" hidden>
              <div class="panel-head">
                <h2 id="app-config-title">App Configuration</h2>
                <span id="app-config-status" class="pill">Selected</span>
              </div>
              <form id="app-config-form" class="settings-form">
	                <label class="toggle-field">
	                  <input id="app-enabled" type="checkbox">
	                  <span>Enabled</span>
	                </label>
	                <label class="setting-field">
	                  <span>App access</span>
	                  <select id="app-user-access">
	                    <option value="admins_only">Admins only</option>
	                    <option value="home_members">Home members</option>
	                  </select>
	                </label>
	                <label class="setting-field">
	                  <span>Public Config JSON</span>
	                  <textarea id="app-public-config" rows="8" spellcheck="false" autocomplete="off"></textarea>
	                </label>
                <div id="app-secret-fields" class="settings-grid"></div>
                <div class="actions wrap">
                  <button type="submit">Save App</button>
                </div>
              </form>
            </div>
          </div>
        </section>

        <section class="panel" id="app-preview" hidden>
          <div class="panel-head">
            <h2>Package Preview</h2>
            <span id="app-preview-status" class="pill">Ready</span>
          </div>
          <div id="app-preview-body" class="stack"></div>
          <div class="actions wrap">
            <button id="app-install-button" type="button" disabled>Install</button>
          </div>
        </section>

      </main>

      <dialog id="app-install-dialog" class="file-dialog">
        <form id="app-package-form" method="dialog">
          <div class="panel-head">
            <h3>Install App</h3>
            <span class="pill">.hankapp</span>
          </div>
          <label class="setting-field">
            <span>Package (.hankapp)</span>
            <input id="app-package-input" type="file" accept=".hankapp,application/zip,application/octet-stream">
          </label>
          <label class="setting-field">
            <span>Or app folder</span>
            <input id="app-folder-input" type="file" webkitdirectory directory multiple>
            <span class="meta">Select the top-level app folder (must contain app.json). It will be packaged into a .hankapp.</span>
          </label>
          <div class="actions wrap">
            <button id="app-install-cancel-button" type="button" class="secondary">Cancel</button>
            <button type="submit">Preview</button>
          </div>
        </form>
      </dialog>

      <div id="toast" class="toast" hidden></div>
    </div>

    <script src="/assets/api-client.js" defer></script>
    <script src="/assets/ui-helpers.js" defer></script>
    <script src="/assets/settings-nav.js" defer></script>
    <script src="/assets/apps.js?v=20260625-folder-upload" defer></script>
    <script src="/assets/admin-nav.js?v=20260608-apps" defer></script>
  </body>
</html>
