services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - path: ./configs/cloud.compose.env.example
        required: true
      - path: ./.env.cloud
        required: false
    volumes:
      - hank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cloud:
    image: hankserverside
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - path: ./configs/cloud.compose.env.example
        required: true
      - path: ./.env.cloud
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HANK_REMOTE_CLOUD_HOST_BIND:-0.0.0.0}:${HANK_REMOTE_CLOUD_HOST_PORT:-18080}:8080"
    command: ["/usr/local/bin/hank-remote-cloud"]
    restart: unless-stopped

  agent:
    image: hankserverside
    profiles:
      - agent
    env_file:
      - path: ./configs/agent.compose.env.example
        required: true
      - path: ./.env.agent
        required: false
    depends_on:
      - cloud
    volumes:
      - hank_agent_files:/srv/hank/files
      - hank_agent_notes:/srv/hank/notes
    command: ["/usr/local/bin/hank-remote-agent"]
    restart: unless-stopped

volumes:
  hank_postgres_data:
  hank_agent_files:
  hank_agent_notes:
