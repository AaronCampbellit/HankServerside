groups:
  - name: hank-remote-production
    rules:
      - alert: HankLoginFailureSpike
        expr: increase(hank_remote_auth_failures_total{kind=~"login_.*"}[10m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Hank login failures spiked
          runbook: docs/runbooks/auth-failures.md
      - alert: HankAgentAuthFailureSpike
        expr: increase(hank_remote_auth_failures_total{kind=~"agent_.*"}[10m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Hank agent authentication failures spiked
          runbook: docs/runbooks/auth-failures.md
      - alert: HankAgentOffline
        expr: hank_remote_online_agents < 1
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: Hank home agent is offline
          runbook: docs/runbooks/agent-offline.md
      - alert: HankRoutedRequestTimeoutSpike
        expr: increase(hank_remote_route_failures_total{code="request_timeout"}[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Hank routed request timeouts increased
          runbook: docs/runbooks/agent-offline.md
      - alert: HankDBConnectionsSaturated
        expr: hank_remote_db_in_use_connections > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Hank database pool is saturated
          runbook: docs/runbooks/single-host-compose.md
      - alert: HankDBPingFailure
        expr: hank_remote_db_ping_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Hank cannot ping the primary database
          runbook: docs/runbooks/storage-failures.md
      - alert: HankStaleBackup
        expr: time() - hank_remote_db_backup_last_success_unixtime > 86400
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Hank database backup is stale
          runbook: docs/runbooks/storage-failures.md
      - alert: HankStaleRestoreTest
        expr: time() - hank_remote_db_restore_test_last_success_unixtime > 604800
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Hank restore test is stale
          runbook: docs/runbooks/storage-failures.md
      - alert: HankDiskUsageHigh
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Hank host disk usage is high
          runbook: docs/runbooks/single-host-compose.md
      - alert: HankFileJobFailureSpike
        expr: increase(hank_remote_file_operation_jobs{status=~"failed|rollback_required"}[15m]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Hank file operation job failures increased
          runbook: docs/runbooks/file-transfer-failures.md
      - alert: HankFileTransferFailures
        expr: increase(hank_remote_route_failures_total{code=~"transfer_.*|route_write_failed"}[15m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Hank file transfer failures increased
          runbook: docs/runbooks/file-transfer-failures.md
      - alert: HankAssistantProviderErrorSpike
        expr: increase(hank_remote_assistant_provider_errors_total[15m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Hank assistant provider errors increased
          runbook: docs/runbooks/home-assistant-failures.md
      - alert: HankCloudRuntimeHeartbeatMissing
        expr: hank_remote_cloud_runtime_up == 0 or hank_remote_cloud_runtime_heartbeat_age_seconds > 45
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Hank cloud runtime heartbeat is missing or stale
          runbook: docs/runbooks/single-host-compose.md
