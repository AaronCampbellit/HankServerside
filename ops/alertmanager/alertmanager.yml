# Default Alertmanager config for the single-host Hank Remote deployment.
#
# The default receiver is a no-op so the stack starts cleanly out of the box.
# Before calling a deployment production-ready, configure at least one real
# receiver (email, webhook, or a push bridge) and test-fire it:
#
#   docker compose --env-file .env.cloud --profile monitoring exec alertmanager \
#     amtool alert add TestAlert severity=info --alertmanager.url=http://127.0.0.1:9093
#
# See https://prometheus.io/docs/alerting/latest/configuration/ for receiver
# examples. Keep SMTP or webhook credentials out of source control: put a
# customized copy of this file on the server and mount it over the default.

route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # No notifier configured: alerts are visible in the Alertmanager UI at
    # http://127.0.0.1:9093 but are not delivered anywhere. Replace with a
    # real receiver for production.
